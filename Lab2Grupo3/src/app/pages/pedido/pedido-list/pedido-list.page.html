<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Pedidos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item *ngFor="let p of pedidos">
      <ion-label>
        <h2>Pedido #{{ p.pedidoId }}</h2>
        <p>Fecha: {{ p.fechaPedido }} | Total: {{ p.total }} {{ p.moneda }}</p>
      </ion-label>
      <ion-button fill="clear" [routerLink]="['/pedidos/editar', p.pedidoId]">
        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" (click)="eliminar(p)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button [routerLink]="['/pedidos/nuevo']">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
