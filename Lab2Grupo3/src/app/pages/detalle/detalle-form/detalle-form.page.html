<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/detalles-pedido"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar Detalle de Pedido' : 'Nuevo Detalle de Pedido' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="guardar()">

    <ion-item>
      <ion-label position="stacked">Pedido (ID)</ion-label>
      <ion-input type="number" formControlName="pedidoId"></ion-input>
    </ion-item>
    <p class="error" *ngIf="form.get('pedidoId')?.touched && form.get('pedidoId')?.invalid">
      Campo obligatorio.
    </p>

    <ion-item>
      <ion-label position="stacked">Producto (código)</ion-label>
      <ion-input type="text" formControlName="productoId"></ion-input>
    </ion-item>
    <p class="error" *ngIf="form.get('productoId')?.touched && form.get('productoId')?.invalid">
      Campo obligatorio.
    </p>

    <ion-item>
      <ion-label position="stacked">Cantidad</ion-label>
      <ion-input type="number" formControlName="cantidad"></ion-input>
    </ion-item>
    <p class="error" *ngIf="form.get('cantidad')?.touched && form.get('cantidad')?.invalid">
      Campo obligatorio.
    </p>

    <ion-item>
      <ion-label position="stacked">Precio unitario</ion-label>
      <ion-input type="number" formControlName="precioUnitario"></ion-input>
    </ion-item>
    <p class="error" *ngIf="form.get('precioUnitario')?.touched && form.get('precioUnitario')?.invalid">
      Campo obligatorio.
    </p>

    <ion-item>
      <ion-label position="stacked">Descuento</ion-label>
      <ion-input type="number" formControlName="descuento"></ion-input>
    </ion-item>

    <ion-button expand="block" type="submit" class="ion-margin-top" [disabled]="guardando">
      {{ isEdit ? 'Actualizar' : 'Guardar' }}
    </ion-button>

  </form>
</ion-content>
