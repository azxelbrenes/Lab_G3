<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Tipos de Cédula</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item *ngFor="let item of tiposCedula">
      <ion-label>
        <p>descripcion: {{ item.descripcion }}</p>
      </ion-label>
      <ion-button fill="clear" [routerLink]="['/tipos-cedula/editar', item.tipoCedula1]">
        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" (click)="eliminar(item)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button [routerLink]="['/tipos-cedula/nuevo']">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
